name: Pytest

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
      - main
      - frontend
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Create env file
        run: |
          touch .env
          echo PACKAGE_DIR_PATH="." >> .env
          echo DATA_DIR_PATH="./data" >> .env
          cat .env

      - name: Run database tests
        run: |
          poetry run pytest tests/test_database/ -v

      - name: Run unit tests
        run: |
          poetry run pytest tests/test_ai_xgboost.py tests/test_results.py tests/test_db_LiveTrail_loader.py tests/test_training_service.py -v
